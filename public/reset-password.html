<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contraseña - ReservaWorkspaces</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-primary); }
    .reset-container { background: var(--bg-secondary); padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { margin-bottom: 1.5rem; color: var(--text-primary); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #555; }
    input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
    input:focus { outline: none; border-color: #4A90D9; }
    .btn-primary { width: 100%; padding: 0.75rem; background: #4A90D9; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .btn-primary:hover { background: #357ABD; }
    .error { color: #d32f2f; margin-bottom: 1rem; }
    .success { color: #388E3C; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2 id="title">Cambiar Contraseña</h2>
    <div id="message"></div>
    <form id="resetForm" style="display:none;">
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input id="newPassword" type="password" minlength="6" required />
      </div>
      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <input id="confirmPassword" type="password" minlength="6" required />
      </div>
      <button type="submit" class="btn-primary">Guardar Contraseña</button>
    </form>
  </div>
  <script>
    const path = window.location.pathname;
    const token = path.split('/reset-password/')[1];

    if (!token) {
      document.getElementById('message').innerHTML = '<p class="error">Token inválido</p>';
    } else {
      document.getElementById('resetForm').style.display = 'flex';
      document.getElementById('resetForm').style.flexDirection = 'column';
      document.getElementById('resetForm').style.gap = '1rem';

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password !== confirm) {
          document.getElementById('message').innerHTML = '<p class="error">Las contraseñas no coinciden</p>';
          return;
        }
        if (password.length < 6) {
          document.getElementById('message').innerHTML = '<p class="error">Mínimo 6 caracteres</p>';
          return;
        }

        try {
          const res = await fetch('/reset-password/' + token, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });
          const data = await res.json();
          if (res.ok) {
            document.getElementById('title').textContent = '¡Listo!';
            document.getElementById('resetForm').remove();
            document.getElementById('message').innerHTML = '<p class="success">Contraseña cambiada. <a href="/" style="text-decoration: none; color: #4A90D9;">Inicia sesión</a></p>';
          } else {
            document.getElementById('message').innerHTML = '<p class="error">' + (data.error || 'Error') + '</p>';
          }
        } catch (err) {
          document.getElementById('message').innerHTML = '<p class="error">Error de conexión</p>';
        }
      });
    }
  </script>
</body>
</html>
